<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" width="380" height="90">
  <!-- Version 3 : Clean, couleurs douces, tagline -->
  <rect width="380" height="90" fill="#f8faff"/>
  
  <!-- Badge coloré -->
  <rect x="0" y="0" width="6" height="90" fill="#1e3a5f"/>

  <!-- Icône poussette moderne -->
  <g transform="translate(22, 12)">
    <path d="M4 16 Q4 8 12 8 L44 8 Q52 8 54 16 L58 34 L0 34 Z" fill="#1e3a5f"/>
    <path d="M44 8 L50 0 L66 0" stroke="#1e3a5f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="12" cy="46" r="8" fill="none" stroke="#1e3a5f" stroke-width="3.5"/>
    <circle cx="12" cy="46" r="2.5" fill="#1e3a5f"/>
    <circle cx="46" cy="46" r="8" fill="none" stroke="#1e3a5f" stroke-width="3.5"/>
    <circle cx="46" cy="46" r="2.5" fill="#1e3a5f"/>
    <line x1="12" y1="34" x2="12" y2="38" stroke="#1e3a5f" stroke-width="3"/>
    <line x1="46" y1="34" x2="46" y2="38" stroke="#1e3a5f" stroke-width="3"/>
  </g>

  <!-- Texte principal -->
  <text x="110" y="38" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#1e3a5f">Meilleure<tspan font-weight="300">Poussette</tspan></text>

  <!-- Tagline -->
  <text x="110" y="60" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#8099b8" letter-spacing="1.5">LE GUIDE COMPARATIF N°1 EN FRANCE</text>
  
  <!-- Étoiles rating -->
  <text x="110" y="78" font-size="12" fill="#FFB800">★★★★★</text>
  <text x="175" y="78" font-family="Arial" font-size="11" fill="#8099b8">+2 400 avis analysés</text>
</svg>
